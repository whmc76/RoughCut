<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RoughCut Full Page Design Board</title>
  <style>
    :root {
      --bg: #f5f8fa;
      --panel: #ffffff;
      --panel-soft: #f8fbfc;
      --line: #dce6ea;
      --line-strong: #bfd0d6;
      --ink: #102033;
      --muted: #637487;
      --subtle: #8aa0ad;
      --teal: #0f8b8d;
      --teal-strong: #08797c;
      --teal-soft: #dff3f1;
      --green: #18865a;
      --green-soft: #e4f5ec;
      --amber: #b56b16;
      --amber-soft: #fff1d6;
      --red: #b43a3a;
      --red-soft: #fae4e4;
      --nav: #0d1c2a;
      --nav-soft: #13283a;
      --shadow: 0 16px 40px rgba(16, 32, 51, .08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; background: #dfe8ec; color: var(--ink); font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; }
    body { min-height: 100vh; }
    button, input, textarea, select { font: inherit; }
    .board-index { max-width: 1200px; margin: 0 auto; padding: 40px; }
    .board-index h1 { margin: 0 0 10px; font-size: 32px; }
    .board-index p { color: var(--muted); margin: 0 0 24px; }
    .index-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .index-grid a { display: block; padding: 14px 16px; border: 1px solid var(--line); border-radius: 8px; background: white; color: var(--ink); text-decoration: none; }
    .screen { width: 1440px; height: 900px; overflow: hidden; background: var(--bg); display: grid; grid-template-columns: 224px 1fr; }
    .rail { background: var(--nav); color: #dbe8ef; padding: 18px 14px; display: flex; flex-direction: column; }
    .brand { display: flex; align-items: center; gap: 10px; padding: 0 2px 24px; }
    .mark { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, #7ee3df, #0f8b8d); display: grid; place-items: center; color: var(--nav); font-weight: 900; }
    .brand strong { display: block; font-size: 18px; color: white; }
    .brand span { display: block; color: #8ca4b5; font-size: 12px; margin-top: 2px; }
    .nav-group { margin: 14px 0; }
    .nav-label { padding: 0 8px 8px; color: #8298aa; font-size: 12px; font-weight: 700; }
    .nav-item { height: 36px; display: flex; align-items: center; gap: 10px; padding: 0 10px; border-radius: 7px; color: #dbe8ef; font-weight: 700; font-size: 14px; }
    .nav-item.active { background: linear-gradient(90deg, #0f8b8d, #0b777a); color: white; }
    .nav-icon { width: 16px; height: 16px; border: 1.8px solid currentColor; border-radius: 4px; opacity: .92; }
    .rail-foot { margin-top: auto; border-top: 1px solid rgba(255,255,255,.1); padding-top: 14px; font-size: 12px; color: #93a9b8; }
    .stage { padding: 18px 22px 22px; overflow: hidden; }
    .page-head { display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; margin-bottom: 14px; }
    .eyebrow { font-size: 12px; color: var(--teal); font-weight: 800; margin-bottom: 4px; }
    h1 { margin: 0; font-size: 28px; line-height: 1.15; }
    .desc { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; flex-wrap: wrap; }
    .btn { height: 34px; border-radius: 6px; border: 1px solid var(--line-strong); background: white; color: var(--ink); padding: 0 12px; font-weight: 800; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
    .btn.primary { border-color: var(--teal-strong); background: var(--teal); color: white; }
    .btn.danger { border-color: #dfb7b7; color: var(--red); background: #fff7f7; }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
    .metric { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; min-height: 76px; padding: 12px; box-shadow: var(--shadow); }
    .metric span { display: block; color: var(--muted); font-size: 12px; font-weight: 700; }
    .metric strong { display: block; margin-top: 6px; font-size: 24px; }
    .metric small { display: block; margin-top: 4px; color: var(--subtle); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; }
    .panel.pad { padding: 14px; }
    .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; padding: 12px 14px; border-bottom: 1px solid var(--line); }
    .panel-head strong { display: block; font-size: 15px; }
    .panel-head span { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }
    .chip { display: inline-flex; height: 24px; align-items: center; border-radius: 999px; padding: 0 9px; font-size: 12px; font-weight: 800; background: #edf4f6; color: var(--muted); white-space: nowrap; }
    .chip.ok { background: var(--green-soft); color: var(--green); }
    .chip.warn { background: var(--amber-soft); color: var(--amber); }
    .chip.bad { background: var(--red-soft); color: var(--red); }
    .chip.teal { background: var(--teal-soft); color: var(--teal-strong); }
    .table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .table th, .table td { border-bottom: 1px solid var(--line); padding: 9px 10px; text-align: left; vertical-align: middle; }
    .table th { color: var(--muted); background: #f7fafb; font-weight: 800; }
    .row-list { display: grid; gap: 8px; padding: 12px; }
    .row { min-height: 52px; border: 1px solid var(--line); border-radius: 7px; padding: 10px; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; background: #fbfdfe; }
    .row strong { display: block; font-size: 13px; }
    .row span, .row small { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }
    .split { display: grid; grid-template-columns: 310px 1fr 330px; gap: 12px; height: 708px; }
    .split.two { grid-template-columns: 340px 1fr; }
    .split.wide-left { grid-template-columns: 380px 1fr 300px; }
    .main-stack { display: grid; gap: 12px; align-content: start; min-height: 0; }
    .video { background: #111923; border-radius: 8px; min-height: 260px; color: white; display: grid; place-items: center; position: relative; overflow: hidden; }
    .video::before { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(126,227,223,.18), transparent 42%), repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 1px, transparent 1px 28px); }
    .video strong { position: relative; font-size: 20px; }
    .inspector { display: grid; gap: 10px; padding: 12px; }
    .field { border: 1px solid var(--line); border-radius: 7px; padding: 9px; background: var(--panel-soft); }
    .field label, .field span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; font-weight: 700; }
    .field strong, .field p { display: block; margin: 0; font-size: 13px; line-height: 1.4; }
    .input { height: 34px; width: 100%; border: 1px solid var(--line-strong); border-radius: 6px; background: white; padding: 0 10px; color: var(--muted); }
    textarea.input { height: 96px; padding: 9px 10px; resize: none; line-height: 1.4; }
    .lane-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .lane { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 12px; min-height: 116px; }
    .lane em { display: block; font-style: normal; color: var(--subtle); font-size: 12px; }
    .lane strong { display: block; font-size: 24px; margin: 7px 0 3px; }
    .flow { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .flow-step { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fbfefe; min-height: 96px; }
    .flow-step small { color: var(--teal); font-weight: 900; }
    .flow-step strong { display: block; margin: 8px 0 3px; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mini-preview { min-height: 140px; border: 1px solid var(--line); border-radius: 8px; background: linear-gradient(135deg, #f8fbfc, #eaf3f5); padding: 12px; display: grid; align-content: end; }
    .tiny-bars { display: grid; gap: 5px; margin-top: 8px; }
    .tiny-bars span { height: 8px; border-radius: 999px; background: #d7e3e7; }
    .tiny-bars span:nth-child(2) { width: 74%; }
    .tiny-bars span:nth-child(3) { width: 52%; }
    .notice { border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px; background: #f8fbfc; color: var(--muted); font-size: 13px; }
    .modal-shell { height: 708px; display: grid; place-items: center; background: linear-gradient(135deg, #eef5f6, #f8fbfc); border: 1px solid var(--line); border-radius: 8px; }
    .modal { width: 880px; min-height: 560px; background: white; border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 24px 80px rgba(16,32,51,.18); display: grid; grid-template-columns: 260px 1fr; overflow: hidden; }
    .modal aside { background: #f7fafb; border-right: 1px solid var(--line); padding: 14px; }
    .modal main { padding: 14px; display: grid; gap: 12px; align-content: start; }
    .timeline { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; height: 76px; align-items: end; }
    .timeline span { background: var(--teal-soft); border: 1px solid #b7dcda; border-radius: 5px 5px 0 0; }
    .timeline span:nth-child(2n) { height: 50px; }
    .timeline span:nth-child(2n+1) { height: 68px; }
    .timeline span:nth-child(3) { background: var(--amber-soft); border-color: #e2c48c; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const screens = [
      ["overview", "总览", "/"],
      ["jobs", "制片队列", "/jobs"],
      ["final-review", "成片审看", "/final-review"],
      ["publication-tracking", "发布跟踪", "/publication-tracking"],
      ["creator-cards", "创作者卡片", "/creator-cards"],
      ["task-strategies", "任务策略", "/task-strategies"],
      ["visual-plans", "视觉方案", "/visual-plans"],
      ["terms-memory", "术语与记忆", "/terms-memory"],
      ["tools", "工具箱", "/tools"],
      ["settings", "系统设置", "/settings"],
      ["control", "服务控制", "/control"],
      ["intelligent-copy", "智能发布旧页", "/intelligent-copy"],
      ["publication-management", "发布配置", "/publication-management"],
      ["watch-roots", "自动任务", "/watch-roots"],
      ["tools-tts", "TTS", "/tools/tts"],
      ["tools-asr", "ASR", "/tools/asr"],
      ["tools-avatar", "数字人", "/tools/avatar"],
      ["manual-editor", "手工编辑器", "/jobs/:jobId/manual-editor"]
    ];

    const nav = {
      "工作流": [["overview", "总览"], ["jobs", "制片队列"], ["final-review", "成片审看"], ["publication-tracking", "发布跟踪"]],
      "资产库": [["creator-cards", "创作者卡片"], ["task-strategies", "任务策略"], ["visual-plans", "视觉方案"], ["terms-memory", "术语与记忆"]],
      "系统": [["tools", "工具箱"], ["settings", "系统设置"], ["control", "服务控制"]]
    };

    const copy = {
      overview: ["系统总览", "跨工作流查看队列压力、服务健康、自动目录和最近活动。"],
      jobs: ["生产控制", "导入、排队、运行、恢复和交接完成输出，不在这里做最终审看或平台发布。"],
      "final-review": ["观众验收", "看最终成片，完成观众体验清单，决定通过进入发布跟踪或退回重剪。"],
      "publication-tracking": ["半手动发布", "选择成片和物料，复制内容，打开平台发布页，发布完成后回填链接和回执。"],
      "creator-cards": ["资产库", "维护创作者身份、平台账号、素材、偏好和默认方案关系。"],
      "task-strategies": ["资产库", "生成、比较并激活任务策略，明确适用任务和审核门槛。"],
      "visual-plans": ["资产库", "管理包装、字幕、封面方向、画面增强和平台适配约束。"],
      "terms-memory": ["知识校准", "维护术语表、学习记忆、热词和最近纠错反馈。"],
      tools: ["诊断工具", "验证 ASR、TTS 和数字人口播服务，执行单次调试。"],
      settings: ["系统配置", "配置模型、质量阈值、运行环境、通知和集成。"],
      control: ["运行控制", "查看健康、补偿队列、诊断细项和维护停机。"],
      "intelligent-copy": ["兼容流程", "选择本地输出目录生成平台物料，完成后进入发布跟踪。"],
      "publication-management": ["平台配置", "维护创作者平台档案、账号绑定、登录确认和物料要求。"],
      "watch-roots": ["自动任务", "检查监听目录和待处理文件，按规则入队。"],
      "tools-tts": ["工具箱", "选择 TTS provider 和模式，输入脚本，生成并预览语音。"],
      "tools-asr": ["工具箱", "上传音频，带热词转写，检查文本和分段。"],
      "tools-avatar": ["工具箱", "上传主播视频和配音，生成数字人口播预览。"],
      "manual-editor": ["制片队列", "围绕单个任务修脚本、素材、时间线和导出准备。"]
    };

    function el(tag, cls, html) {
      const node = document.createElement(tag);
      if (cls) node.className = cls;
      if (html != null) node.innerHTML = html;
      return node;
    }

    function rail(active) {
      const aside = el("aside", "rail");
      aside.append(el("div", "brand", `<div class="mark">R</div><div><strong>RoughCut</strong><span>Operator Console</span></div>`));
      for (const [group, items] of Object.entries(nav)) {
        const wrap = el("div", "nav-group");
        wrap.append(el("div", "nav-label", group));
        items.forEach(([key, label]) => wrap.append(el("div", `nav-item ${key === active ? "active" : ""}`, `<span class="nav-icon"></span>${label}`)));
        aside.append(wrap);
      }
      aside.append(el("div", "rail-foot", `<strong>混合模式</strong><br>当前 Bundled<br><br><strong>界面语言</strong><br>简中&nbsp;&nbsp;EN`));
      return aside;
    }

    function head(key, title, actions = []) {
      const [eyebrow, desc] = copy[key];
      return `<header class="page-head"><div><div class="eyebrow">${eyebrow}</div><h1>${title}</h1><p class="desc">${desc}</p></div><div class="actions">${actions.join("")}</div></header>`;
    }

    function btn(label, primary = false, danger = false) {
      return `<button class="btn ${primary ? "primary" : ""} ${danger ? "danger" : ""}">${label}</button>`;
    }

    function summary(items) {
      return `<div class="summary">${items.map(i => `<div class="metric"><span>${i[0]}</span><strong>${i[1]}</strong><small>${i[2]}</small></div>`).join("")}</div>`;
    }

    function panel(title, desc, body, action = "") {
      return `<section class="panel"><div class="panel-head"><div><strong>${title}</strong><span>${desc}</span></div>${action}</div>${body}</section>`;
    }

    function rows(items) {
      return `<div class="row-list">${items.map(i => `<div class="row"><div><strong>${i[0]}</strong><span>${i[1]}</span></div><span class="chip ${i[2] || ""}">${i[3]}</span></div>`).join("")}</div>`;
    }

    function table(headers, body) {
      return `<table class="table"><thead><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${body.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
    }

    function overview() {
      return head("overview", "总览", [btn("刷新"), btn("打开服务控制", true)])
        + summary([["总任务", "50", "当前库内任务"], ["运行中", "4", "worker 正在处理"], ["待处理", "2", "失败或需人工确认"], ["服务在线", "8/8", "运行健康"]])
        + `<div class="split two"><div class="main-stack">${panel("工作入口", "进入具体页面处理任务，不在首页完成业务决策", rows([["制片队列", "导入、运行、恢复和成片交接", "teal", "进入"], ["成片审看", "检查最终成片并决定通过或退回", "", "进入"], ["自动任务", "查看监听目录和待入库素材", "", "进入"], ["工具箱", "诊断 ASR、TTS、数字人和临时工具", "", "进入"]]))}${panel("当前队列", "只显示正在推进和需要注意的任务", rows([["瑞士军刀收藏盘点", "增强版 MP4 已生成，等待审看", "teal", "待审"], ["S02E06 · 挖树桩", "失败，等待恢复处理", "bad", "异常"], ["S02E49 · 安静的游戏", "处理中", "teal", "运行"]]))}</div><div class="main-stack">${panel("运行健康", "服务状态和补偿队列是首页默认信号", `<div class="lane-grid"><div class="lane"><em>api</em><strong>在线</strong><span class="chip ok">ready</span></div><div class="lane"><em>orchestrator</em><strong>在线</strong><span class="chip ok">ready</span></div><div class="lane"><em>media_worker</em><strong>在线</strong><span class="chip ok">ready</span></div><div class="lane"><em>llm_worker</em><strong>在线</strong><span class="chip ok">ready</span></div></div>`)}${panel("最近活动", "生产、审看和系统事件的跨页面记录", table(["时间", "页面", "事件", "下一步"], [["14:31", "服务控制", "补偿队列已清空", "完成"], ["14:18", "成片审看", "退回重剪", "制片队列"], ["13:42", "制片队列", "重跑成功", "审看"]]))}</div></div>`;
    }

    function jobs() {
      return head("jobs", "制片队列", [btn("刷新"), btn("全能剪辑"), btn("智能导演"), btn("解说二创", true)])
        + summary([["待处理", "9", "等待入库或 worker"], ["运行中", "4", "剪辑和包装"], ["需处理", "3", "失败恢复"], ["完成输出", "6", "可交接审看"]])
        + `<div class="main-stack">${panel("生产状态带", "第一屏回答今天卡在哪里", `<div class="flow"><div class="flow-step"><small>01</small><strong>导入和排队</strong><span>校验素材、脚本和创作者绑定</span></div><div class="flow-step"><small>02</small><strong>运行和恢复</strong><span>重试、取消、打开文件夹、查看日志</span></div><div class="flow-step"><small>03</small><strong>完成输出交接</strong><span>审看完成输出，不能跳过观众验收</span></div></div>`)}<div class="split two" style="height:510px"><div class="main-stack">${panel("完成输出", "只给交接动作，不做最终发布", rows([["MAXACE 美杜莎4 开箱", "enhanced_mp4 优先，字幕已打包", "teal", "审看"], ["户外装备清单分享", "packaged_mp4 可用", "teal", "审看"], ["EDC 工具使用技巧", "等待封面检查", "warn", "详情"]]))}${panel("失败恢复", "失败原因要可见，可直接重试或打开日志", rows([["瑞士军刀收藏盘点", "ASR 结果为空", "bad", "重试"], ["MOT 风灵音叉", "输出目录缺权限", "bad", "打开"]]))}</div><div>${panel("任务队列", "详细操作面保留在表格", table(["文件", "状态", "步骤", "更新时间", "操作"], [["maxace.mp4", `<span class="chip ok">完成</span>`, "包装完成", "14:22", "审看 详情 下载"], ["outdoor.mov", `<span class="chip teal">运行</span>`, "字幕增强", "14:08", "详情 取消"], ["knife.mp4", `<span class="chip warn">待处理</span>`, "缺脚本", "13:55", "手工编辑"]]))}</div></div></div>`;
    }

    function finalReview() {
      return head("final-review", "成片审看", [btn("退回重剪"), btn("通过并进入发布跟踪", true)])

        + `<div class="split two"><section class="panel">${panel("监听目录", "选择目录查看待处理内容", rows([["/incoming/edc", "12 个待处理文件", "teal", "当前"], ["/incoming/outdoor", "3 个待处理文件", "", "选择"], ["/incoming/archive", "无新增", "ok", "空"]])).replace('<section class="panel">','').replace('</section>','')}</section><main class="main-stack">${panel("待处理内容", "入队前展示规则匹配和缺失项", table(["文件", "识别类型", "创作者", "状态", "操作"], [["maxace-raw.mp4", "产品开箱", "MAXACE 开箱号", `<span class="chip ok">可入队</span>`, "入队"], ["knife-script.txt", "脚本", "MAXACE 开箱号", `<span class="chip ok">已匹配</span>`, "查看"], ["missing-cover.jpg", "封面", "未知", `<span class="chip warn">待确认</span>`, "绑定"]]))}${panel("入队方式", "自动目录只负责生成任务，不负责审看或发布", `<div class="flow"><div class="flow-step"><small>1</small><strong>扫描目录</strong><span>识别素材和脚本</span></div><div class="flow-step"><small>2</small><strong>匹配规则</strong><span>创作者、任务类型、模板</span></div><div class="flow-step"><small>3</small><strong>创建任务</strong><span>进入制片队列</span></div></div>`)}</main></div>`;
    }

    function toolDetail(kind) {
      const data = {
        "tools-tts": ["TTS 文本转语音", "生成语音", "Provider 与模式", "参考音频", "脚本文本", "音频预览"],
        "tools-asr": ["ASR 音频转文字", "开始转写", "ASR 服务", "音频文件", "热词上下文", "转写结果"],
        "tools-avatar": ["数字人口播", "生成预览", "HeyGem 服务", "主播视频", "配音音频", "预览视频"]
      }[kind];
      return head(kind, data[0], [btn("返回工具箱"), btn(data[1], true)])
        + `<div class="split two"><section class="panel">${panel(data[2], "工具子页保留输入、运行和结果三段", `<div class="inspector"><div class="field"><span>${data[3]}</span><input class="input" value="选择或拖入文件"></div><div class="field"><span>${data[4]}</span><textarea class="input">用于本次工具测试的输入内容。</textarea></div><div class="field"><span>参数</span><strong>官方推荐预设，允许高级展开</strong></div><button class="btn primary">${data[1]}</button></div>`).replace('<section class="panel">','').replace('</section>','')}</section><main class="main-stack">${panel(data[5], "结果可预览、复制、下载，并显示错误", `<div class="video" style="background:#eef5f6;color:var(--ink);min-height:240px"><strong>${data[5]}</strong></div>`)}${panel("运行日志", "工具测试必须能定位失败原因", rows([["提交任务", "参数校验通过", "ok", "完成"], ["服务调用", "等待本地服务返回", "teal", "运行中"], ["结果保存", "输出到临时目录", "", "待完成"]]))}</main></div>`;
    }

    function manualEditor() {
      return head("manual-editor", "手工编辑器", [btn("保存草稿"), btn("导出并返回队列", true)])
        + `<div class="modal-shell"><div class="modal"><aside><div class="panel-head" style="padding:0 0 12px;border-bottom:0"><div><strong>MAXACE 美杜莎4</strong><span>job_rc_20260630_1422</span></div><span class="chip warn">需人工</span></div>${rows([["脚本段落", "12 段，可编辑口播和字幕", "teal", "打开"], ["素材轨道", "主视频、B-roll、封面", "teal", "打开"], ["就绪检查", "3 项待处理", "warn", "检查"]])}</aside><main>${panel("时间线", "围绕单个任务修剪，不替代全局队列", `<div class="timeline"><span></span><span></span><span></span><span></span><span></span><span></span></div>`)}${panel("脚本和字幕", "编辑会影响后续导出和成片审看", table(["段落", "口播", "字幕", "状态"], [["01", "开场介绍产品", "已同步", `<span class="chip ok">通过</span>`], ["02", "结构细节", "待校对", `<span class="chip warn">待处理</span>`], ["03", "握持体验", "已同步", `<span class="chip ok">通过</span>`]]))}${panel("导出就绪", "满足检查后返回制片队列继续流水线", rows([["素材齐全", "视频、脚本、音频均已绑定", "ok", "通过"], ["字幕校对", "第二段待校对", "warn", "处理"], ["封面方向", "引用视觉方案默认封面", "ok", "通过"]]))}</main></div></div>`;
    }

    const renderers = {
      overview, jobs, "final-review": finalReview, "publication-tracking": publicationTracking,
      "creator-cards": creatorCards, "task-strategies": strategyPage, "visual-plans": visualPlans,
      "terms-memory": termsMemory, tools, settings, control, "intelligent-copy": intelligentCopy,
      "publication-management": publicationManagement, "watch-roots": watchRoots,
      "tools-tts": () => toolDetail("tools-tts"), "tools-asr": () => toolDetail("tools-asr"),
      "tools-avatar": () => toolDetail("tools-avatar"), "manual-editor": manualEditor
    };

    function renderScreen(key) {
      const title = screens.find(x => x[0] === key)?.[1] || key;
      const screen = el("div", "screen");
      screen.append(rail(key));
      const stage = el("main", "stage");
      stage.innerHTML = renderers[key]();
      screen.append(stage);
      return screen;
    }

    const params = new URLSearchParams(location.search);
    const selected = params.get("screen");
    const app = document.querySelector("#app");
    if (selected && renderers[selected]) {
      app.append(renderScreen(selected));
    } else {
      const index = el("div", "board-index", `<h1>RoughCut Full Page Design Board</h1><p>Open a frame with <code>?screen=&lt;key&gt;</code>. Each frame is 1440 by 900.</p>`);
      const grid = el("div", "index-grid");
      screens.forEach(([key, label, route]) => grid.append(el("a", "", `<strong>${label}</strong><br><span>${route}</span><br><code>${key}</code>`)));
      index.append(grid);
      app.append(index);
    }
  </script>
</body>
</html>
