services:
  cosyvoice3-tts:
    build:
      context: .
      dockerfile: deploy/cosyvoice3/Dockerfile
      args:
        BASE_IMAGE: ${COSYVOICE3_BASE_IMAGE:-roughcut-moss-audio:local}
    image: roughcut-cosyvoice3-tts:local
    container_name: cosyvoice3-tts
    profiles: ["cosyvoice3-tts"]
    gpus: all
    ipc: host
    shm_size: 16gb
    ports:
      - "${COSYVOICE3_TTS_PORT:-30180}:8080"
    environment:
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-600}
      COSYVOICE3_MODEL_ID: ${COSYVOICE3_MODEL_ID:-FunAudioLLM/Fun-CosyVoice3-0.5B-2512}
      COSYVOICE3_DOWNLOAD_BACKEND: ${COSYVOICE3_DOWNLOAD_BACKEND:-huggingface}
      COSYVOICE3_MODEL_DIR: /models/cosyvoice3
      COSYVOICE3_FP16: ${COSYVOICE3_FP16:-1}
      COSYVOICE3_LOAD_VLLM: ${COSYVOICE3_LOAD_VLLM:-}
      COSYVOICE3_LOAD_TRT: ${COSYVOICE3_LOAD_TRT:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - ${COSYVOICE3_MODEL_CACHE:-C:/sample-workspace/RoughCut/.model-cache/cosyvoice3}:/models
    restart: unless-stopped
