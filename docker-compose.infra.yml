name: roughcut

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roughcut
      POSTGRES_PASSWORD: roughcut
      POSTGRES_DB: roughcut
    ports:
      - "${ROUGHCUT_POSTGRES_PORT:-25432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roughcut"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${ROUGHCUT_REDIS_PORT:-26379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  redis_data:
