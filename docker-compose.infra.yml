name: roughcut

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roughcut
      POSTGRES_PASSWORD: roughcut
      POSTGRES_DB: roughcut
    ports:
      - "${ROUGHCUT_POSTGRES_PORT:-25432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roughcut"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${ROUGHCUT_REDIS_PORT:-26379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-39000}:9000"
      - "${MINIO_CONSOLE_PORT:-39001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  redis_data:
  minio_data:
