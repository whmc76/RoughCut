services:
  moss-tts-local:
    build:
      context: .
      dockerfile: deploy/moss-tts-local/Dockerfile
      args:
        BASE_IMAGE: ${MOSS_TTS_LOCAL_BASE_IMAGE:-docker.m.daocloud.io/pytorch/pytorch:2.9.1-cuda12.8-cudnn9-devel}
        MOSS_TTS_REPO_URL: ${MOSS_TTS_REPO_URL:-https://github.com/OpenMOSS/MOSS-TTS.git}
    image: roughcut-moss-tts-local:local
    container_name: moss-tts-local
    profiles: ["moss-tts-local"]
    gpus: all
    ipc: host
    shm_size: 16gb
    ports:
      - "${MOSS_TTS_LOCAL_PORT:-30191}:8080"
    environment:
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_ENDPOINT: ${MOSS_TTS_LOCAL_HF_ENDPOINT:-https://huggingface.co}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-600}
      MOSS_TTS_LOCAL_MODEL_ID: ${MOSS_TTS_LOCAL_MODEL_ID:-OpenMOSS-Team/MOSS-TTS-Local-Transformer}
      MOSS_TTS_LOCAL_MODELSCOPE_MODEL_ID: ${MOSS_TTS_LOCAL_MODELSCOPE_MODEL_ID:-OpenMOSS/MOSS-TTS-Local-Transformer}
      MOSS_TTS_LOCAL_DOWNLOAD_BACKEND: ${MOSS_TTS_LOCAL_DOWNLOAD_BACKEND:-modelscope}
      MOSS_TTS_LOCAL_MODEL_DIR: /models/moss-tts-local-transformer
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - ${MOSS_TTS_LOCAL_MODEL_CACHE:-E:/WorkSpace/RoughCut/.model-cache/moss-tts-local}:/models
    restart: unless-stopped
