name: roughcut

x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://roughcut:roughcut@postgres:5432/roughcut
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_BUCKET_NAME: roughcut
  S3_REGION: us-east-1
  DB_USE_NULL_POOL: "true"
  ROUGHCUT_API_WORKERS: ${ROUGHCUT_API_WORKERS:-2}
  ROUGHCUT_API_GRACEFUL_SHUTDOWN_SEC: ${ROUGHCUT_API_GRACEFUL_SHUTDOWN_SEC:-8}
  ROUGHCUT_API_KEEP_ALIVE_SEC: ${ROUGHCUT_API_KEEP_ALIVE_SEC:-3}
  ROUGHCUT_API_BACKLOG: ${ROUGHCUT_API_BACKLOG:-4096}
  ROUGHCUT_OUTPUT_ROOT: /app/data
  ROUGHCUT_TEST_OUTPUT_ROOT: /app/data/tests
  JOB_STORAGE_DIR: /app/data/jobs
  OUTPUT_DIR: /app/data/output
  RENDER_DEBUG_DIR: /app/logs/render-debug
  TELEGRAM_AGENT_STATE_DIR: /app/data/telegram-agent
  XDG_CACHE_HOME: /app/data/cache
  HF_HOME: /app/data/cache/huggingface
  TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-local_http_asr}
  TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-vibevoice-asr-int8}
  LOCAL_ASR_API_BASE_URL: ${ROUGHCUT_DOCKER_LOCAL_ASR_API_BASE_URL:-http://host.docker.internal:6001}
  LOCAL_ASR_MODEL_NAME: ${LOCAL_ASR_MODEL_NAME:-vibevoice-asr-int8}
  LOCAL_ASR_DISPLAY_NAME: ${LOCAL_ASR_DISPLAY_NAME:-VibeVoice INT8}
  ROUGHCUT_DOCKER_GPUS: ${ROUGHCUT_DOCKER_GPUS:-all}
  SUBTITLE_FONT: Noto Sans CJK SC
  COVER_TITLE_FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc
  HEYGEM_SHARED_ROOT: /code/data
  HEYGEM_VOICE_ROOT: /code/data/voice/data
  AVATAR_API_BASE_URL: ${ROUGHCUT_DOCKER_AVATAR_API_BASE_URL:-http://host.docker.internal:49202}
  AVATAR_TRAINING_API_BASE_URL: ${ROUGHCUT_DOCKER_AVATAR_TRAINING_API_BASE_URL:-http://host.docker.internal:49204}
  VOICE_CLONE_API_BASE_URL: ${ROUGHCUT_DOCKER_VOICE_CLONE_API_BASE_URL:-http://host.docker.internal:49204}
  COSYVOICE3_TTS_API_BASE_URL: ${ROUGHCUT_DOCKER_COSYVOICE3_TTS_API_BASE_URL:-http://cosyvoice3-tts:8080}
  MOSS_TTS_LOCAL_API_BASE_URL: ${ROUGHCUT_DOCKER_MOSS_TTS_LOCAL_API_BASE_URL:-http://moss-tts-local:8080}
  SEARXNG_URL: ${ROUGHCUT_DOCKER_SEARXNG_URL:-http://host.docker.internal:8080}
  PUBLICATION_BROWSER_AGENT_BASE_URL: ${ROUGHCUT_DOCKER_PUBLICATION_BROWSER_AGENT_BASE_URL:-http://host.docker.internal:49310}
  OLLAMA_BASE_URL: ${ROUGHCUT_DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      ROUGHCUT_PYTHON_EXTRAS: ${ROUGHCUT_DOCKER_PYTHON_EXTRAS:-}
  image: roughcut:local
  env_file:
    - .env
  environment:
    <<: *app-env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ${ROUGHCUT_OUTPUT_HOST_ROOT:-./data/runtime}:/app/data
    - ${ROUGHCUT_AVATAR_MATERIALS_HOST_ROOT:-./data/avatar_materials}:/app/data/avatar_materials
    - ${ROUGHCUT_OUTPUT_HOST_ROOT:-./data/runtime}/render-debug:/app/logs/render-debug
    - ./logs:/app/logs
    - ./watch:/app/watch
    - ${HEYGEM_SHARED_HOST_DIR:-D:/duix_avatar_data/face2face}:/code/data
    - ${ROUGHCUT_CODEX_AUTH_HOST_DIR:-C:/Users/28687/.codex}:/host-codex:ro
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roughcut
      POSTGRES_PASSWORD: roughcut
      POSTGRES_DB: roughcut
    ports:
      - "${ROUGHCUT_POSTGRES_PORT:-25432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roughcut"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${ROUGHCUT_REDIS_PORT:-26379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-39000}:9000"
      - "${MINIO_CONSOLE_PORT:-39001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ROUGHCUT_PYTHON_EXTRAS: ${ROUGHCUT_DOCKER_PYTHON_EXTRAS:-}
    image: roughcut:local
    env_file:
      - .env
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["roughcut", "migrate"]
    restart: "no"

  api:
    <<: *app-common
    command: ["roughcut", "api", "--host", "0.0.0.0", "--port", "${ROUGHCUT_API_INTERNAL_PORT:-8000}", "--workers", "${ROUGHCUT_API_WORKERS:-2}", "--timeout-graceful-shutdown", "${ROUGHCUT_API_GRACEFUL_SHUTDOWN_SEC:-8}", "--timeout-keep-alive", "${ROUGHCUT_API_KEEP_ALIVE_SEC:-3}"]
    ports:
      - "${ROUGHCUT_API_PORT:-38471}:${ROUGHCUT_API_INTERNAL_PORT:-8000}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${ROUGHCUT_API_INTERNAL_PORT:-8000}/healthz"]
      interval: 10s
      timeout: 10s
      retries: 12

  orchestrator:
    <<: *app-common
    command: ["roughcut", "orchestrator", "--poll-interval", "2"]

  worker-media:
    <<: *app-common
    gpus: ${ROUGHCUT_DOCKER_GPUS:-all}
    environment:
      <<: *app-env
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}
    command: ["roughcut", "worker", "--queue", "media_queue", "--pool", "prefork", "--concurrency", "2"]

  worker-llm:
    <<: *app-common
    gpus: ${ROUGHCUT_DOCKER_GPUS:-all}
    environment:
      <<: *app-env
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}
    command: ["roughcut", "worker", "--queue", "llm_queue", "--pool", "prefork", "--concurrency", "2"]

  worker-agent:
    <<: *app-common
    command: ["roughcut", "worker", "--queue", "agent_queue", "--pool", "prefork", "--concurrency", "2"]

  worker-publication:
    <<: *app-common
    command: ["roughcut", "worker", "--queue", "publication_queue", "--pool", "prefork", "--concurrency", "1"]

  watcher:
    <<: *app-common
    command: ["roughcut", "watcher", "/app/watch"]
    profiles: ["watcher"]

volumes:
  pg_data:
  redis_data:
  minio_data:
