name: roughcut

x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://roughcut:roughcut@postgres:5432/roughcut
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_BUCKET_NAME: roughcut
  S3_REGION: us-east-1
  OUTPUT_DIR: /app/data/output
  RENDER_DEBUG_DIR: /app/logs/render-debug
  SUBTITLE_FONT: Noto Sans CJK SC
  COVER_TITLE_FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  image: roughcut:local
  env_file:
    - .env
  environment:
    <<: *app-env
  volumes:
    - ./data/output:/app/data/output
    - ./logs:/app/logs
    - ./watch:/app/watch
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roughcut
      POSTGRES_PASSWORD: roughcut
      POSTGRES_DB: roughcut
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roughcut"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: roughcut:local
    env_file:
      - .env
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["roughcut", "migrate"]
    restart: "no"

  api:
    <<: *app-common
    command: ["roughcut", "api", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  orchestrator:
    <<: *app-common
    command: ["roughcut", "orchestrator", "--poll-interval", "2"]

  worker-media:
    <<: *app-common
    command: ["roughcut", "worker", "--queue", "media_queue", "--pool", "prefork", "--concurrency", "2"]

  worker-llm:
    <<: *app-common
    command: ["roughcut", "worker", "--queue", "llm_queue", "--pool", "prefork", "--concurrency", "2"]

  watcher:
    <<: *app-common
    command: ["roughcut", "watcher", "/app/watch"]
    profiles: ["watcher"]

volumes:
  pg_data:
  redis_data:
  minio_data:
