<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RoughCut A2 mark</title>
  <desc id="desc">A cyberpunk AI editing mark with machine-vision arcs, a play core, scan brackets, and a timeline cut point.</desc>
  <defs>
