      OCR_ENABLED: "true"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OPENAI_API_KEY: ""
      OUTPUT_DIR: /app/data/output
      OUTPUT_NAME_PATTERN: '{date}_{stem}'
      QWEN_ASR_API_BASE_URL: http://host.docker.internal:18096
      REASONING_MODEL: MiniMax-M2.7-highspeed
      REASONING_PROVIDER: minimax
      REDIS_URL: redis://redis:6379/0
      RENDER_DEBUG_DIR: /app/logs/render-debug
      RESEARCH_VERIFIER_ENABLED: "true"
      ROUGHCUT_ACP_BRIDGE_BACKEND: claude
      ROUGHCUT_ACP_BRIDGE_CLAUDE_MODEL: opus
      ROUGHCUT_ACP_BRIDGE_CODEX_COMMAND: codex
      ROUGHCUT_ACP_BRIDGE_CODEX_MODEL: gpt-5.4-mini
      ROUGHCUT_ACP_BRIDGE_FALLBACK_BACKEND: codex
      ROUGHCUT_DOCKER_GPUS: all
      ROUGHCUT_OUTPUT_HOST_ROOT: F:/roughcut_outputs
      ROUGHCUT_OUTPUT_ROOT: F:/roughcut_outputs
      ROUGHCUT_REDIS_PORT: "26379"
      ROUGHCUT_TEST_OUTPUT_ROOT: F:/roughcut_outputs/tests
