name: roughcut
services:
  api:
    build:
      context: E:\WorkSpace\RoughCut
      dockerfile: Dockerfile
      args:
        ROUGHCUT_PYTHON_EXTRAS: ""
    command:
      - roughcut
      - api
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: true
      minio:
        condition: service_healthy
        required: true
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      ALLOWED_EXTENSIONS: '[".mp4",".mov",".mkv",".avi",".webm"]'
      ANTHROPIC_API_KEY: ""
      ASR_EVIDENCE_ENABLED: "true"
      AVATAR_API_BASE_URL: http://host.docker.internal:49202
      AVATAR_TRAINING_API_BASE_URL: http://host.docker.internal:49204
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CLEANUP_HEYGEM_TEMP_ON_TERMINAL: "true"
      CLEANUP_JOB_STORAGE_ON_TERMINAL: "true"
      CLEANUP_RENDER_DEBUG_ON_TERMINAL: "true"
      COVER_TITLE_FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc
      DATABASE_URL: postgresql+asyncpg://roughcut:roughcut@postgres:5432/roughcut
      ENTITY_GRAPH_ENABLED: "true"
      FFMPEG_TIMEOUT_SEC: "600"
      HEYGEM_SHARED_HOST_DIR: F:/roughcut_outputs/heygem
      HEYGEM_SHARED_ROOT: /code/data
      HEYGEM_VOICE_ROOT: /code/data/voice/data
      HF_HOME: /app/data/cache/huggingface
      JOB_STORAGE_DIR: /app/data/jobs
      MAX_UPLOAD_SIZE_MB: "2048"
      MAX_VIDEO_DURATION_SEC: "7200"
      MINIMAX_API_HOST: https://api.minimaxi.com
      MINIMAX_API_KEY: sk-cp-NLFhE2PphXtl6XvCxeas1cY66KvMpLjO-bstnpGsknJYHn90TSi8mGj61Ni5TeSzplDYGRGpkNLVNbJNwV4ki5cOJQPAaybZ8XnK-d9w06u2Z6F4F5z6bNg
