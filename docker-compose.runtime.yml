x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://roughcut:roughcut@postgres:5432/roughcut
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_BUCKET_NAME: roughcut
  S3_REGION: us-east-1
  OUTPUT_DIR: /app/data/output
  RENDER_DEBUG_DIR: /app/logs/render-debug
  SUBTITLE_FONT: Noto Sans CJK SC
  COVER_TITLE_FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc
  HEYGEM_SHARED_ROOT: /code/data
  HEYGEM_VOICE_ROOT: /code/data/voice/data
  AVATAR_API_BASE_URL: ${AVATAR_API_BASE_URL:-http://host.docker.internal:49202}
  AVATAR_TRAINING_API_BASE_URL: ${AVATAR_TRAINING_API_BASE_URL:-http://host.docker.internal:49204}

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      ROUGHCUT_PYTHON_EXTRAS: ${ROUGHCUT_DOCKER_PYTHON_EXTRAS:-}
  image: roughcut:local
  env_file:
    - .env
  environment:
    <<: *app-env
  volumes:
    - ./data/output:/app/data/output
    - ./logs:/app/logs
    - ./watch:/app/watch
    - ${HEYGEM_SHARED_HOST_DIR:-E:/WorkSpace/heygem/data}:/code/data
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ROUGHCUT_PYTHON_EXTRAS: ${ROUGHCUT_DOCKER_PYTHON_EXTRAS:-}
    image: roughcut:local
    env_file:
      - .env
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["roughcut", "migrate"]
    restart: "no"

  api:
    <<: *app-common
    command: ["roughcut", "api", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${ROUGHCUT_API_PORT:-38471}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12

  orchestrator:
    <<: *app-common
    command: ["roughcut", "orchestrator", "--poll-interval", "2"]

  worker-media:
    <<: *app-common
    command: ["roughcut", "worker", "--queue", "media_queue", "--pool", "prefork", "--concurrency", "2"]

  worker-llm:
    <<: *app-common
    command: ["roughcut", "worker", "--queue", "llm_queue", "--pool", "prefork", "--concurrency", "2"]
