x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://roughcut:roughcut@postgres:5432/roughcut
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  JOB_STORAGE_DIR: /app/data/jobs
  OUTPUT_DIR: /app/data/output
  RENDER_DEBUG_DIR: /app/logs/render-debug
  XDG_CACHE_HOME: /app/data/cache
  HF_HOME: /app/data/cache/huggingface
  ROUGHCUT_DOCKER_GPUS: ${ROUGHCUT_DOCKER_GPUS:-all}
  SUBTITLE_FONT: Noto Sans CJK SC
  COVER_TITLE_FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc
  HEYGEM_SHARED_ROOT: /code/data
  HEYGEM_VOICE_ROOT: /code/data/voice/data
  AVATAR_API_BASE_URL: ${AVATAR_API_BASE_URL:-http://host.docker.internal:49202}
  AVATAR_TRAINING_API_BASE_URL: ${AVATAR_TRAINING_API_BASE_URL:-http://host.docker.internal:49204}
  OLLAMA_BASE_URL: ${ROUGHCUT_DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      ROUGHCUT_PYTHON_EXTRAS: ${ROUGHCUT_DOCKER_PYTHON_EXTRAS:-local-asr}
  image: roughcut:local
  env_file:
    - .env
  environment:
    <<: *app-env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ${ROUGHCUT_OUTPUT_HOST_ROOT:-F:/roughcut_outputs}/jobs:/app/data/jobs
    - ${ROUGHCUT_OUTPUT_HOST_ROOT:-F:/roughcut_outputs}/output:/app/data/output
    - ${ROUGHCUT_OUTPUT_HOST_ROOT:-F:/roughcut_outputs}/cache:/app/data/cache
    - ${ROUGHCUT_OUTPUT_HOST_ROOT:-F:/roughcut_outputs}/render-debug:/app/logs/render-debug
    - ./watch:/app/watch
    - ${HEYGEM_SHARED_HOST_DIR:-F:/roughcut_outputs/heygem}:/code/data
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ROUGHCUT_PYTHON_EXTRAS: ${ROUGHCUT_DOCKER_PYTHON_EXTRAS:-local-asr}
    image: roughcut:local
    env_file:
      - .env
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["roughcut", "migrate"]
    restart: "no"

  api:
    <<: *app-common
    command: ["roughcut", "api", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${ROUGHCUT_API_PORT:-38471}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12

  orchestrator:
    <<: *app-common
    command: ["roughcut", "orchestrator", "--poll-interval", "2"]

  worker-media:
    <<: *app-common
    gpus: ${ROUGHCUT_DOCKER_GPUS:-all}
    environment:
      <<: *app-env
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}
    command: ["roughcut", "worker", "--queue", "media_queue", "--pool", "prefork", "--concurrency", "2"]

  worker-llm:
    <<: *app-common
    gpus: ${ROUGHCUT_DOCKER_GPUS:-all}
    environment:
      <<: *app-env
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,video}
    command: ["roughcut", "worker", "--queue", "llm_queue", "--pool", "prefork", "--concurrency", "2"]
